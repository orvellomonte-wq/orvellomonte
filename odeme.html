<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guvenli Odeme | Orvello Monte</title>
  <meta name="description" content="Orvello Monte PayTR guvenli odeme ekrani.">
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="paytr-checkout-page">
  <main class="paytr-checkout-shell">
    <section class="paytr-checkout-frame" aria-live="polite">
      <div class="paytr-frame-status" id="paytr-frame-status">Odeme ekrani yukleniyor...</div>
      <iframe id="paytriframe" title="PayTR Guvenli Odeme" frameborder="0" scrolling="no" allow="payment"></iframe>
    </section>
  </main>

  <script>
    (() => {
      const storageKey = "orvello-paytr-payment";
      const status = document.getElementById("paytr-frame-status");
      const iframe = document.getElementById("paytriframe");

      const showError = (message) => {
        status.innerHTML = `
          <strong>${message}</strong>
          <a class="button primary" href="index.html">Sepete Don</a>
        `;
        iframe.hidden = true;
      };

      let payment = null;

      try {
        payment = JSON.parse(sessionStorage.getItem(storageKey) || "null");
      } catch {
        payment = null;
      }

      const isFresh = payment?.createdAt && Date.now() - Number(payment.createdAt) < 60 * 60 * 1000;
      const isPaytrUrl = typeof payment?.iframeUrl === "string"
        && payment.iframeUrl.startsWith("https://www.paytr.com/odeme/guvenli/");

      if (!payment || !isFresh || !isPaytrUrl) {
        showError("Odeme oturumu bulunamadi veya suresi doldu.");
        return;
      }

      iframe.src = payment.iframeUrl;
      iframe.hidden = false;
      status.hidden = true;

      const script = document.createElement("script");
      script.src = "https://www.paytr.com/js/iframeResizer.min.js";
      script.onload = () => window.iFrameResize?.({}, "#paytriframe");
      document.head.appendChild(script);
    })();
  </script>
</body>
</html>
